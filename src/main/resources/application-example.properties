# ==========================================
# Server Configuration
# ==========================================
server.port=8080
server.servlet.context-path=/

# ==========================================
# Database Configuration (MySQL)
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/budget_tracker?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
spring.datasource.username=root
# ⚠️ UPDATE THIS: Replace with your actual MySQL root password
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / Hibernate Configuration
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ==========================================
# JWT Configuration
# ==========================================
app.jwt.secret=BudgetTrackerSuperSecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLong2024!
app.jwt.expiration=86400000

# ==========================================
# Email Configuration (Gmail SMTP)
# ==========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
# ⚠️ UPDATE THIS: Replace with your Gmail address and App Password
# To create an App Password: Google Account > Security > 2FA > App Passwords
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000
# Allows app to start even without valid email config
spring.mail.test-connection=false

# ==========================================
# File Upload Configuration
# ==========================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/receipts

# ==========================================
# App Configuration
# ==========================================
app.frontend.url=http://localhost:8080
app.password-reset.expiry=3600000

# ==========================================
# Logging
# ==========================================
logging.level.com.budgettracker=INFO
logging.level.org.springframework.security=WARN

# ==========================================
# Actuator
# ==========================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
